<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAXD Wellness — Business OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script>
      // GitHub Pages SPA fix — restore route from 404.html redirect
      (function() {
        var p = window.location.search.slice(1);
        if (p && p.indexOf('p=') === 0) {
          var decoded = decodeURIComponent(p.slice(2));
          window.history.replaceState(null, null,
            window.location.pathname.split('/').slice(0, 2).join('/') +
            '/' + decoded
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
