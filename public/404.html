<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MAXD Business OS</title>
    <script>
      // GitHub Pages SPA fix — redirect 404s back to index.html
      // preserving the route in a query param that index.html picks back up.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '')) +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
